<header class="header">
  <div class="header-inner">
    <a class="logo" id="nav-logo" href="index.html">Paetzold Lab</a>

    <nav class="top-nav">
      <ul>
        <li><a id="nav-home"    href="index.html">Home</a></li>
        <li><a id="nav-research" href="research.html">Research</a></li>
        <li><a id="nav-team"    href="team.html">Team</a></li>
        <li><a id="nav-join"    href="join_us.html">Join Us</a></li>
      </ul>
    </nav>

    <div class="nav-right">
      <button class="search-btn" aria-label="Open search"><span class="search-icon" aria-hidden="true"></span></button>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</header>

<script>
// Ensure header initialization runs even when this fragment is injected after DOMContentLoaded
(function initHeader(){
  function run(){
    // --- Set active nav link ---
    const isInSubdirectory = window.location.pathname.includes('/team_members_subpage/');
    const file = (location.pathname.split('/').pop() || 'index.html').toLowerCase();
    const map  = {
      'index.html'   : 'nav-home',
      'research.html': 'nav-research',
      'team.html'    : 'nav-team',
      'join_us.html' : 'nav-join',
      'pi.html'      : 'nav-team'
    };
    const activeLink = document.getElementById(isInSubdirectory ? 'nav-team' : map[file]);
    if (activeLink) activeLink.classList.add('active');

    const hrefs = {
      'nav-logo': 'index.html',
      'nav-home': 'index.html',
      'nav-research': 'research.html',
      'nav-team': 'team.html',
      'nav-join': 'join_us.html'
    };
    Object.entries(hrefs).forEach(([id, path]) => {
      const link = document.getElementById(id);
      if (!link) return;
      const href = window.PaetzoldSite?.assetPath
        ? window.PaetzoldSite.assetPath(path)
        : `${isInSubdirectory ? '../' : './'}${path}`;
      link.setAttribute('href', href);
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run, { once: true });
  } else {
    run();
  }
})();
</script>
